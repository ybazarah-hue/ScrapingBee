name: Daily SERP Rank Tracker

on:
  schedule:
    # 03:00 UTC = 06:00 صباحاً بتوقيت الرياض (الرياض = UTC+3)
    # الصيغة: دقيقة ساعة يوم شهر يوم-الأسبوع
    # مثال: 7 صباحاً الرياض = '0 4 * * *'  |  8 صباحاً = '0 5 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch: {}   # يسمح بالتشغيل اليدوي للتجربة

permissions:
  contents: write          # لازم لحفظ ملف النبضة داخل الريبو

concurrency:
  group: rank-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rank tracker
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          KEYWORDS_JSON: ${{ secrets.KEYWORDS_JSON }}   # اختياري
          TARGET_DOMAIN: ${{ secrets.TARGET_DOMAIN }}   # اختياري
        run: python rank_tracker.py

      - name: Commit heartbeat
        run: |
          git config user.name "rank-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add last_run.txt || true
          git commit -m "run $(date -u +%F)" || echo "لا جديد للحفظ"
          git push || echo "تعذّر الدفع"
